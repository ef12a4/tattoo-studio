<style>
/* Neon Theme */
:root {
    --primary-color: #0a0a0a;
    --secondary-color: #ffffff;
    --accent-color: #00ff88;
    --background-color: #000000;
    --text-color: #ffffff;
    --neon-glow: 0 0 20px #00ff88;
    --neon-text: #00ff88;
}

body {
    background-color: var(--background-color) !important;
    color: var(--text-color) !important;
    font-family: 'Orbitron', monospace;
}

.navbar {
    background-color: #0a0a0a !important;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.3) !important;
}

.navbar-brand, .navbar-nav .nav-link {
    color: var(--neon-text) !important;
    text-shadow: var(--neon-glow) !important;
}

.hero-section {
    background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%) !important;
    position: relative;
    overflow: hidden;
}

.hero-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        radial-gradient(circle at 20% 80%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
    animation: neonPulse 4s ease-in-out infinite;
}

@keyframes neonPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
}

.section-title {
    color: var(--neon-text) !important;
    text-shadow: var(--neon-glow) !important;
    border-bottom: 3px solid var(--neon-text) !important;
}

.btn-primary {
    background-color: transparent !important;
    border: 2px solid var(--neon-text) !important;
    color: var(--neon-text) !important;
    box-shadow: var(--neon-glow) !important;
}

.btn-primary:hover {
    background-color: var(--neon-text) !important;
    color: #000000 !important;
    box-shadow: 0 0 30px var(--neon-text) !important;
}

.card {
    background-color: rgba(10, 10, 10, 0.8) !important;
    border: 1px solid rgba(0, 255, 136, 0.3) !important;
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.2) !important;
}

.portfolio-item:hover {
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.4) !important;
    transform: translateY(-5px) scale(1.02);
}

.service-card {
    background-color: rgba(10, 10, 10, 0.8) !important;
    border: 1px solid rgba(0, 255, 136, 0.3) !important;
    transition: all 0.3s ease;
}

.service-card:hover {
    border-color: var(--neon-text) !important;
    box-shadow: 0 0 25px rgba(0, 255, 136, 0.4) !important;
}

.form-control {
    background-color: rgba(10, 10, 10, 0.8) !important;
    border: 1px solid rgba(0, 255, 136, 0.3) !important;
    color: var(--text-color) !important;
}

.form-control:focus {
    border-color: var(--neon-text) !important;
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.3) !important;
}

.footer {
    background-color: #0a0a0a !important;
    border-top: 1px solid rgba(0, 255, 136, 0.3) !important;
}

/* Neon Animasyonlar */
@keyframes neonFlicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
}

.neon-text {
    animation: neonFlicker 2s infinite;
}

/* Grid arka plan */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(rgba(0, 255, 136, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -1;
}
</style>
