<style>
/* Watercolor Theme */
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap');

:root {
    --primary-color: #2c3e50;
    --secondary-color: #ffffff;
    --accent-color: #e74c3c;
    --background-color: #f8f9fa;
    --text-color: #2c3e50;
    --watercolor-blue: #3498db;
    --watercolor-pink: #ff6b9d;
    --watercolor-purple: #a29bfe;
    --watercolor-yellow: #fdcb6e;
    --watercolor-green: #6ab04c;
}

body {
    background-color: var(--background-color) !important;
    color: var(--text-color) !important;
    font-family: 'Quicksand', sans-serif !important;
    position: relative;
}

/* Watercolor arka plan */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 10% 20%, rgba(52, 152, 219, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 90% 30%, rgba(255, 107, 157, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 70%, rgba(162, 155, 254, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(253, 203, 110, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 20% 90%, rgba(106, 176, 76, 0.1) 0%, transparent 50%);
    z-index: -1;
    pointer-events: none;
}

.navbar {
    background-color: rgba(255, 255, 255, 0.9) !important;
    backdrop-filter: blur(10px) !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3) !important;
}

.navbar-brand, .navbar-nav .nav-link {
    color: var(--text-color) !important;
    font-weight: 500 !important;
}

.hero-section {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 249, 250, 0.9)) !important;
    position: relative;
    overflow: hidden;
}

.hero-section::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
        radial-gradient(circle at 25% 25%, var(--watercolor-blue) 0%, transparent 40%),
        radial-gradient(circle at 75% 25%, var(--watercolor-pink) 0%, transparent 40%),
        radial-gradient(circle at 25% 75%, var(--watercolor-purple) 0%, transparent 40%),
        radial-gradient(circle at 75% 75%, var(--watercolor-yellow) 0%, transparent 40%);
    opacity: 0.1;
    animation: watercolorFloat 20s ease-in-out infinite;
}

@keyframes watercolorFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(20px, -20px) rotate(1deg); }
    50% { transform: translate(-20px, 20px) rotate(-1deg); }
    75% { transform: translate(20px, 20px) rotate(1deg); }
}

.section-title {
    color: var(--text-color) !important;
    border-bottom: none !important;
    position: relative;
    padding-bottom: 15px;
    margin-bottom: 30px;
}

.section-title::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100px;
    height: 3px;
    background: linear-gradient(90deg, var(--watercolor-blue), var(--watercolor-pink));
    border-radius: 2px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--watercolor-blue), var(--watercolor-purple)) !important;
    border: none !important;
    color: white !important;
    font-weight: 500 !important;
    border-radius: 25px !important;
    padding: 12px 30px !important;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

.btn-primary::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    transition: left 0.5s;
}

.btn-primary:hover::before {
    left: 100%;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
}

.card {
    background-color: rgba(255, 255, 255, 0.8) !important;
    border: none !important;
    border-radius: 15px !important;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1) !important;
    backdrop-filter: blur(10px) !important;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--watercolor-blue), var(--watercolor-pink), var(--watercolor-purple));
}

.portfolio-item {
    background-color: rgba(255, 255, 255, 0.8) !important;
    border: none !important;
    border-radius: 15px !important;
    overflow: hidden;
    position: relative;
}

.portfolio-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 100%;
    background: radial-gradient(circle at center, transparent 0%, rgba(52, 152, 219, 0.1) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
}

.portfolio-item:hover::before {
    opacity: 1;
}

.portfolio-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
}

.service-card {
    background-color: rgba(255, 255, 255, 0.8) !important;
    border: none !important;
    border-radius: 15px !important;
    padding: 25px !important;
    text-align: center;
    position: relative;
    overflow: hidden;
}

.service-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, var(--watercolor-yellow) 0%, transparent 70%);
    opacity: 0.05;
    transition: all 0.5s ease;
}

.service-card:hover::before {
    top: -25%;
    left: -25%;
}

.form-control {
    background-color: rgba(255, 255, 255, 0.8) !important;
    border: 2px solid transparent !important;
    border-radius: 10px !important;
    color: var(--text-color) !important;
    backdrop-filter: blur(10px) !important;
    transition: all 0.3s ease;
}

.form-control:focus {
    border-color: var(--watercolor-blue) !important;
    box-shadow: 0 0 20px rgba(52, 152, 219, 0.2) !important;
    background-color: rgba(255, 255, 255, 0.95) !important;
}

.contact-form {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 249, 250, 0.9)) !important;
    border-radius: 20px !important;
    backdrop-filter: blur(10px) !important;
    border: 1px solid rgba(255, 255, 255, 0.3) !important;
}

.footer {
    background: linear-gradient(135deg, rgba(44, 62, 80, 0.9), rgba(52, 73, 94, 0.9)) !important;
    backdrop-filter: blur(10px) !important;
    position: relative;
}

.footer::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--watercolor-blue), var(--watercolor-pink), var(--watercolor-purple), var(--watercolor-yellow), var(--watercolor-green));
}

/* Watercolor damla efektleri */
.watercolor-splash {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.1;
    pointer-events: none;
}

.splash-1 {
    width: 200px;
    height: 200px;
    background: var(--watercolor-blue);
    top: 10%;
    left: 5%;
    animation: splash1 15s ease-in-out infinite;
}

.splash-2 {
    width: 150px;
    height: 150px;
    background: var(--watercolor-pink);
    top: 60%;
    right: 10%;
    animation: splash2 20s ease-in-out infinite;
}

.splash-3 {
    width: 180px;
    height: 180px;
    background: var(--watercolor-purple);
    bottom: 20%;
    left: 15%;
    animation: splash3 18s ease-in-out infinite;
}

@keyframes splash1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -20px) scale(1.2); }
}

@keyframes splash2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-20px, 30px) scale(0.8); }
}

@keyframes splash3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, 20px) scale(1.1); }
}

/* Fırça darbesi efektleri */
.brush-stroke {
    position: relative;
}

.brush-stroke::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 100%;
    height: 8px;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 8"><path d="M0,4 Q25,8 50,4 T100,4" stroke="%23e74c3c" stroke-width="2" fill="none" opacity="0.3"/></svg>') repeat-x;
    background-size: 100px 8px;
}
</style>
