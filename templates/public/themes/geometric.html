<style>
/* Geometric Theme */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
    --primary-color: #1a1a1a;
    --secondary-color: #ffffff;
    --accent-color: #ff6b35;
    --background-color: #f5f5f5;
    --text-color: #1a1a1a;
    --geo-primary: #ff6b35;
    --geo-secondary: #004643;
    --geo-accent: #fce181;
    --geo-dark: #1a1a1a;
}

body {
    background-color: var(--background-color) !important;
    color: var(--text-color) !important;
    font-family: 'Inter', sans-serif !important;
    position: relative;
}

/* Geometric arka plan desen */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(45deg, rgba(255, 107, 53, 0.05) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 107, 53, 0.05) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255, 107, 53, 0.05) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255, 107, 53, 0.05) 75%);
    background-size: 60px 60px;
    background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
    z-index: -1;
}

.navbar {
    background-color: var(--geo-dark) !important;
    border-bottom: 4px solid var(--geo-primary) !important;
    clip-path: polygon(0 0, 100% 0, 100% 85%, 95% 100%, 0 100%);
    height: 70px;
}

.navbar-brand, .navbar-nav .nav-link {
    color: var(--secondary-color) !important;
    font-weight: 600 !important;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.hero-section {
    background: linear-gradient(135deg, var(--geo-secondary) 0%, var(--geo-primary) 100%) !important;
    position: relative;
    overflow: hidden;
}

.hero-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        polygon(100% 0, 0 0, 0 100%) var(--geo-accent),
        polygon(100% 0, 100% 100%, 0 100%) rgba(255, 255, 255, 0.1);
    clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
    opacity: 0.1;
    animation: geometricRotate 20s linear infinite;
}

@keyframes geometricRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.section-title {
    color: var(--geo-dark) !important;
    border-bottom: none !important;
    position: relative;
    padding-left: 20px;
    margin-bottom: 30px;
}

.section-title::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    background: var(--geo-primary);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}

.btn-primary {
    background-color: var(--geo-primary) !important;
    border: none !important;
    color: white !important;
    font-weight: 600 !important;
    text-transform: uppercase;
    letter-spacing: 1px;
    clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
    padding: 12px 30px !important;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    background-color: var(--geo-secondary) !important;
    transform: translateX(5px);
    clip-path: polygon(0% 0%, 90% 0%, 100% 100%, 10% 100%);
}

.card {
    background-color: white !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: 0 4px 0 var(--geo-primary) !important;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 40px 40px 0;
    border-color: transparent var(--geo-accent) transparent transparent;
}

.portfolio-item {
    background-color: white !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: 0 4px 0 var(--geo-primary) !important;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

.portfolio-item::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, var(--geo-primary), var(--geo-accent), var(--geo-secondary));
}

.portfolio-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 0 var(--geo-primary);
}

.service-card {
    background-color: white !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: 0 4px 0 var(--geo-primary) !important;
    padding: 30px !important;
    position: relative;
    text-align: center;
}

.service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: var(--geo-primary);
}

.service-card::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    background: var(--geo-accent);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    opacity: 0.1;
}

.form-control {
    background-color: white !important;
    border: 2px solid transparent !important;
    border-bottom: 2px solid var(--geo-primary) !important;
    border-radius: 0 !important;
    color: var(--geo-dark) !important;
    font-family: 'Inter', sans-serif !important;
    transition: all 0.3s ease;
}

.form-control:focus {
    border-color: var(--geo-primary) !important;
    box-shadow: none !important;
    border-bottom: 2px solid var(--geo-accent) !important;
}

.contact-form {
    background-color: white !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: 0 8px 0 var(--geo-primary) !important;
    padding: 40px !important;
    position: relative;
}

.contact-form::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, var(--geo-primary), var(--geo-accent), var(--geo-secondary));
}

.footer {
    background-color: var(--geo-dark) !important;
    border-top: 4px solid var(--geo-primary) !important;
    clip-path: polygon(0 15%, 5% 0, 100% 0, 100% 100%, 0 100%);
    padding-top: 30px !important;
}

/* Geometric dekoratif elementler */
.geo-pattern {
    position: absolute;
    width: 100px;
    height: 100px;
    opacity: 0.1;
}

.geo-triangle {
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    background: var(--geo-primary);
}

.geo-square {
    clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
    background: var(--geo-accent);
}

.geo-hexagon {
    clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
    background: var(--geo-secondary);
}

/* Geometric hover efektleri */
.geo-hover {
    position: relative;
    overflow: hidden;
}

.geo-hover::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, var(--geo-accent), transparent);
    transition: left 0.5s;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}

.geo-hover:hover::before {
    left: 100%;
}

/* Responsive geometric patterns */
@media (max-width: 768px) {
    .navbar {
        height: 60px;
        clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
    }
    
    .btn-primary {
        clip-path: polygon(15% 0%, 100% 0%, 85% 100%, 0% 100%);
    }
    
    .btn-primary:hover {
        clip-path: polygon(0% 0%, 85% 0%, 100% 100%, 15% 100%);
    }
}

/* Geometric animasyonlar */
@keyframes geometricPulse {
    0%, 100% { transform: scale(1); opacity: 0.1; }
    50% { transform: scale(1.2); opacity: 0.2; }
}

.geo-animated {
    animation: geometricPulse 4s ease-in-out infinite;
}
</style>
