<!-- Card Slider - Codehalweb inspired -->
<style>
.card-slider-component {
    padding: 60px 0;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d3436 100%);
    border-radius: 20px;
    margin: 40px 0;
}

.card-slider-section {
    position: relative;
    height: 500px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card-container {
    width: 100%;
    max-width: 1200px;
    border-radius: 20px;
}

.card-slider {
    overflow: hidden;
    border-radius: 20px;
}

.card-wrapper {
    display: flex;
    transition: transform 0.5s ease;
}

.card-slide {
    min-width: 300px;
    flex: 0 0 auto;
    margin: 0 15px;
}

.artist-card {
    position: relative;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    border: 2px solid var(--secondary-color);
    border-radius: 20px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    overflow: hidden;
}

.artist-card::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: var(--secondary-color);
    clip-path: circle(55% at 0 0);
    border-top-left-radius: 10px;
    transition: all 0.3s ease;
}

.artist-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 20px 40px rgba(255, 107, 53, 0.3);
    border-color: var(--accent-color);
}

.artist-card:hover::before {
    clip-path: circle(65% at 0 0);
}

.card-content {
    position: relative;
    display: flex;
    align-items: center;
    flex-direction: column;
    padding: 30px;
    z-index: 2;
}

.artist-image {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--secondary-color);
    overflow: hidden;
    margin-bottom: 20px;
    transition: all 0.3s ease;
}

.artist-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    transition: all 0.3s ease;
}

.artist-card:hover .artist-image {
    transform: scale(1.1);
    border-color: var(--accent-color);
}

.artist-info {
    text-align: center;
    color: white;
}

.artist-name {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--secondary-color);
}

.artist-specialty {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 15px;
    color: rgba(255, 255, 255, 0.8);
}

.artist-rating {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    gap: 5px;
}

.artist-rating i {
    font-size: 18px;
    color: var(--secondary-color);
    transition: all 0.3s ease;
}

.artist-card:hover .artist-rating i {
    color: var(--accent-color);
    transform: scale(1.2);
}

.artist-actions {
    display: flex;
    justify-content: space-around;
    width: 100%;
    margin-top: 20px;
    gap: 15px;
}

.action-btn {
    background: var(--secondary-color);
    border: none;
    outline: none;
    color: white;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
}

.action-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    transition: left 0.6s;
}

.action-btn:hover {
    background: white;
    color: var(--secondary-color);
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 25px rgba(255, 107, 53, 0.4);
}

.action-btn:hover::before {
    left: 100%;
}

.slider-controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.slider-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid var(--secondary-color);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    color: var(--secondary-color);
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

.slider-btn:hover {
    background: var(--secondary-color);
    color: white;
    transform: scale(1.1);
    box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4);
}

/* Navigation dots */
.slider-dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    border: 2px solid var(--secondary-color);
    cursor: pointer;
    transition: all 0.3s ease;
}

.dot.active {
    background: var(--secondary-color);
    transform: scale(1.3);
}

.dot:hover {
    background: var(--accent-color);
    border-color: var(--accent-color);
}

/* Responsive */
@media (max-width: 768px) {
    .card-slide {
        min-width: 250px;
        margin: 0 10px;
    }
    
    .artist-card {
        padding: 20px;
    }
    
    .artist-image {
        width: 100px;
        height: 100px;
    }
    
    .artist-name {
        font-size: 18px;
    }
    
    .artist-actions {
        flex-direction: column;
        gap: 10px;
    }
    
    .action-btn {
        padding: 8px 16px;
        font-size: 12px;
    }
}
</style>

<script>
let currentSlide = 0;
const cardWrapper = document.getElementById('cardWrapper');
const dots = document.querySelectorAll('.dot');
const totalSlides = 4;

function updateSlider() {
    const slideWidth = 330; // card width + margin
    cardWrapper.style.transform = `translateX(-${currentSlide * slideWidth}px)`;
    
    // Update dots
    dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === currentSlide);
    });
}

function slideCards(direction) {
    currentSlide += direction;
    
    if (currentSlide < 0) {
        currentSlide = totalSlides - 1;
    } else if (currentSlide >= totalSlides) {
        currentSlide = 0;
    }
    
    updateSlider();
}

function goToSlide(slideIndex) {
    currentSlide = slideIndex;
    updateSlider();
}

// Auto-slide
setInterval(() => {
    slideCards(1);
}, 5000);
</script>
