{% extends "base.html" %}

{% block title %}Giriş - Dövmeci Stüdyosu{% endblock %}

{% block login_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-palette-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-2">Dövmeci Stüdyosu</h3>
                    <p class="text-muted">Yönetim Paneli</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Kullanıcı Adı</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Şifre</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Giriş Yap</button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <small class="text-muted">
                        Demo: Kullanıcı: admin / Şifre: admin123
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
